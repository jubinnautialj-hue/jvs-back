<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="referrer" content="no-referrer" />
    <link rel="shortcut icon" href="/favicon.ico">
    <title>J-IM:支持百万在线用户</title>
    <style type="text/css" media="screen">
        * {
            margin: 0;
            padding: 0;
        }

        #wrap {
            margin: 10px auto;
            width: 80%;
            height: 99%;
        }

        .unit {
            margin-bottom: 5px;
            padding: 5px;
            border: solid 1px #000;
            height: auto;
            /*clear: both;*/
            box-sizing: border-box;
        }

        .unit label {
            text-align: right;
            width: 100px;
            line-height: 30px;
            display: inline-block;
        }

        .unit input {
            line-height: 30px;
            width: 100px;
            height: 30px;
        }

        .log {
            font-size: 11px;
            font-family: Courier;
            overflow: auto;
            height: 100%;
            background: black;
            width: 70%;
            float: left
        }

        .log p {
            padding: 2px;
            margin: 0;
        }

        .content {
            width: 100%;
            overflow: hidden;
            height: 95%;
            margin: 5px 0 5px 0;
        }

        .friendOnline {
            width: 15%;
            height: 100%;
            float: left;
            background: #FCFCFC;
            border: solid 1px #000;
            box-sizing: border-box;
            overflow: auto;
        }

        .groupOnline {
            width: 15%;
            height: 100%;
            float: right;
            background: #FCFCFC;
            border: solid 1px #000;
            box-sizing: border-box;
            overflow: auto;
        }
    </style>
    <script type="text/javascript" src="./static/js/date.js"></script>
</head>
<script>
    var socket;
    var logDiv;
    var code;
    var logType;
    var userId;
    var onSelected;
    var curUser;
    var value;
    var friends = [];
    var groups = [];
    var toGroupId;

    function connect() {
        if (curUser) {
            console.log("用户对象", JSON.stringify(curUser))
            alert("当前已登录,请先退出登录!");
            return;
        }
        var ip = document.getElementById("serverIp").value;
        var port = document.getElementById("port").value;
        logType = document.getElementById("logType").value;
        var code = document.getElementById("code").value;
        var tempLinkId = document.getElementById("tempLinkId").value;
        value = code;
        logDiv = document.getElementById('logs');
        socket = new WebSocket("ws:" + ip + ":" + port + "/im/?logType=" + logType + "&value=" + value + "&tempLinkId=" + tempLinkId);
        socket.onopen = function (e) {
        };
        socket.onerror = function (e) {
            logDiv.innerHTML += "<font color='red' size='1'>异常:" + e + "</font><br>";
            scrollToBottom();
        };
        socket.onclose = function (e) {
            curUser = null;
            logDiv.innerHTML += "<font color='green' size='1'>关闭连接...</font><br>";
            document.getElementById("groupOnlinePanel").innerHTML = "&nbsp;在线成员(0/0)";
            document.getElementById("friendOnlinePanel").innerHTML = "&nbsp;在线成员(0/0)";
            scrollToBottom();
        };
        socket.onmessage = function (e) {
            console.log(e)
            var data = e.data;
            var dataObj = eval("(" + data + ")");//转换为json对象

            console.log("响应: ["+JSON.stringify(dataObj) + "]");

            if (dataObj.code != 10000) {
                console.log("异常消息:"+dataObj.msg);
            }

            if (dataObj.command == 12) {//接收到聊天响应处理;
                // alert(JSON.stringify(dataObj))
                COMMAND_CHAT_RESP(dataObj);
            } else if (dataObj.command == 18) {//获取用户信息响应处理;
                COMMAND_GET_USER_RESP(dataObj);
            } else if (10000 == dataObj.code && dataObj.command == 12) {//聊天发送状态;
                COMMAND_CHAT_RESP_SEND_STATUS(data);
            } else if (dataObj.command == 9) {//加入群组的消息通知处理;
                COMMAND_JOIN_GROUP_NOTIFY_RESP(dataObj);
            } else if (dataObj.command == 10) {
                COMMAND_EXIT_GROUP_NOTIFY_RESP(dataObj);

            } else if (dataObj.command == 20) {
                COMMAND_GET_MESSAGE_RESP(dataObj, data);
            }
            else if (dataObj.command == 6) {//登陆命令返回状态处理
                COMMAND_LOGIN_RESP(dataObj, data);
            } else if(dataObj.command == 22) { // 处理通知消息
                COMMAND_NOTIFY_RESP(dataObj);
            } else {
                OTHER(data);
            }
            scrollToBottom();
        };
    }

    //登陆通知处理
    function COMMAND_LOGIN_RESP(dataObj, data) {
        // console.log("6登录: "+JSON.stringify(dataObj))

        if (10000 == dataObj.code) {//登陆成功;
            curUser = dataObj.data;
            logDiv.innerHTML += "<font color='green' size='1'>连接成功...</font><br>";
            socket.send(userCmd);//获取登录用户信息;
            // socket.send(msgCmd);//获取用户离线消息(好友+群组);
            scrollToBottom();
        } else if (10008 == dataObj.code) {//登录失败;
            OTHER(data);
        }
    }

    function getUserFriendsAndGroups() {
        logDiv.innerHTML += "<font color='green' size='1'>获取用户好友和群组信息...</font><br>";
        var userCmd = "{\"cmd\":\"17\",\"type\":\"2\",\"userId\":\"" + curUser.userId + "\"}";
        socket.send(userCmd);
    }

    function COMMAND_EXIT_GROUP_NOTIFY_RESP(data) {
        var exitGroupNotify = data.data;
        var onlineUserCmd = "{\"cmd\":\"17\",\"type\":\"2\",\"userId\":\"" + curUser.userId + "\"}";
        logDiv.innerHTML += "<font color='#A3A3A3' size='1'>" + exitGroupNotify.user.nick + "(" + exitGroupNotify.user.userId + ")退出群聊...</font><br>";
        socket.send(onlineUserCmd);//获取在线用户列表;
    }

    //加入群组的消息通知处理;
    function COMMAND_JOIN_GROUP_NOTIFY_RESP(data) {
        var user = data.data.user;
        logDiv.innerHTML += "<font color='#A3A3A3' size='1'>" + user.nick + "(" + user.userId + ")加入群聊...</font><br>";
        // var onlineUserCmd = "{\"cmd\":17,\"type\":\"0\",\"userId\":\"" + curUser.userId + "\"}";
        // socket.send(onlineUserCmd);//获取在线用户列表;
    }

    //加入群组响应状态处理;
    function COMMAND_JOIN_GROUP_RESP(data) {
        //成功加入群组响应信息;
    }

    //发送聊天请求发送状态处理;
    function COMMAND_CHAT_RESP_SEND_STATUS(data) {
        //发送成功后的状态处理...
    }

    //获取用户信息响应处理;
    function COMMAND_GET_USER_RESP(data) {
        // console.log("18用户信息响应"+JSON.stringify(data))

        var user = data.data;
        curUser = user;
        // 组用户列表
        initOnlineGroupUsers();
        // 好友列表
        initOnlineFriendUsers();
    }

    //接收到聊天响应处理;
    function COMMAND_CHAT_RESP(data) {
        console.log("12聊天响应："+JSON.stringify(data))
        var chatObj = data.data;
        if (!chatObj) {
            return;
        }
        var createTime = new Date(chatObj.createTime).Format("yyyy/MM/dd HH:mm:ss");
        var from = chatObj.from;
        if (from == curUser.userId)
            return;
        var content = chatObj.content;
        var user = getOnlineUserById(from);
        if (user) {
            logDiv.innerHTML += "<font color='#009ACD' size='1' style='font-weight: bold'>" + user.realName + "(" + user.userId + ")" + " " + createTime + "</font><br>";
        } else {
            logDiv.innerHTML += "<font color='#009ACD' size='1' style='font-weight: bold'>" + from + " " + createTime + "</font><br>";
        }
        //处理数据
        logDiv.innerHTML += "<font color='#FFFFFF' size='1'>&nbsp;" + content + "</font><br>";
    }

    //接收到通知响应处理;
    function COMMAND_NOTIFY_RESP(data) {
        // console.log("22通知: "+JSON.stringify(data))

        var chatObj = data.data;
        if (!chatObj) {
            // alert("请求响应不需要处理")
            return;
        }
        var createTime = new Date(chatObj.createTime).Format("yyyy/MM/dd HH:mm:ss");
        var from = chatObj.from;
        if (from == curUser.userId)
            return;
        var content = chatObj.content;
        var user = getOnlineUserById(from);

        logDiv.innerHTML += "<font color='#009ACD' size='1' style='font-weight: bold'>" + chatObj.title + ":" + content + " " + createTime + "</font><br>";
        // if (user) {
        //     logDiv.innerHTML += "<font color='#009ACD' size='1' style='font-weight: bold'>" + user.nick + "(" + user.id + ")" + " " + createTime + "</font><br>";
        // } else {
        //     logDiv.innerHTML += "<font color='#009ACD' size='1' style='font-weight: bold'>" + from + " " + createTime + "</font><br>";
        // }
        //处理数据
        logDiv.innerHTML += "<font color='#FFFFFF' size='1'>&nbsp;" + content + "</font><br>";

        //alert("通知：" + chatObj.title + " : " + content);
    }



    //处理用户同步+持久化消息
    function COMMAND_GET_MESSAGE_RESP(dataObj, data) {
        var msgObj = dataObj.data;
        var msgFlag = "";
        if (msgObj.type == 0 || msgObj.type == 2) {
            msgFlag = "离线消息";
        }
        if (msgObj.type == 1 || msgObj.type == 3) {
            msgFlag = "历史消息";
        }
        if (!msgFlag) {
            OTHER(data);
        } else {
            // console.log("20"+msgFlag + ": "+JSON.stringify(data))
            friendOfflineMessage(msgObj, msgFlag);
            groupOfflineMessage(msgObj, msgFlag);
            notifyOfflineMessage(msgObj, msgFlag);
        }
    }


    // 离线通知消息处理
    function notifyOfflineMessage(msgObj, msgFlag) {
        var notifyDatas = msgObj.notifys;
        // console.log(JSON.stringify(notifyDatas))
        for (var index in notifyDatas) {
            var user_id = notifyDatas[index].from;
            var createTime = new Date(notifyDatas[index].createTime).Format("yyyy/MM/dd HH:mm:ss");
            logDiv.innerHTML += "<font color='	#009ACD' size='1' style='font-weight: bold'>" + user_id + "</font><font color='#DC143C' size='1' style='font-weight: bold'>(通知" + msgFlag + ")</font>" + "<font color='#009ACD' size='1' style='font-weight: bold'>" + createTime + "</font><br>";
            logDiv.innerHTML += "<font color='#FFFFFF' size='1'>&nbsp;"+ notifyDatas[index].title + " : "+ notifyDatas[index].content + "</font><br>";
        }
    }

    //好友消息
    function friendOfflineMessage(msgObj, msgFlag) {
        var friends = msgObj.friends;
        for (var key in friends) {
            var chatDatas = friends[key];
            for (var index in chatDatas) {
                var user_id = chatDatas[index].from;
                var createTime = new Date(chatDatas[index].createTime).Format("yyyy/MM/dd HH:mm:ss");
                logDiv.innerHTML += "<font color='	#009ACD' size='1' style='font-weight: bold'>" + user_id + "</font><font color='#DC143C' size='1' style='font-weight: bold'>(好友" + msgFlag + ")</font>" + "<font color='#009ACD' size='1' style='font-weight: bold'>" + createTime + "</font><br>";
                logDiv.innerHTML += "<font color='#FFFFFF' size='1'>&nbsp;" + chatDatas[index].content + "</font><br>";
            }
        }
    }

    //群组消息
    function groupOfflineMessage(msgObj, msgFlag) {
        var groups = msgObj.groups;
        for (var key in groups) {
            var chatDatas = groups[key];
            for (var index in chatDatas) {
                var user_id = chatDatas[index].from;
                var createTime = new Date(chatDatas[index].createTime).Format("yyyy/MM/dd HH:mm:ss");
                logDiv.innerHTML += "<font color='	#009ACD' size='1' style='font-weight: bold'>" + user_id + "</font><font color='#DC143C' size='1' style='font-weight: bold'>(群聊[" + chatDatas[index].groupId + "]" + msgFlag + ")</font>" + "<font color='#009ACD' size='1' style='font-weight: bold'>" + createTime + "</font><br>";
                logDiv.innerHTML += "<font color='#FFFFFF' size='1'>&nbsp;" + chatDatas[index].content + "</font><br>";
            }
        }
    }

    //其它信息处理;
    function OTHER(data) {
        //处理数据
        logDiv.innerHTML += "<font color='green' size='1'>" + data + "</font><br>";
    }

    function getOnlineUserById(id) {
        var friends = curUser.friends;
        var onlineUserStr = "";
        for (var g = 0; g < friends.length; g++) {
            var friend = friends[g];
            var users = friend.users;
            for (var u = 0; u < users.length; u++) {
                var user = users[u];
                if (user.userId == id) {
                    return user;
                }
            }
        }
    }

    function initOnlineGroupUsers() {
        if (!curUser.groups) {
            onlineUserStr = "&nbsp;在线成员(0/0)";
            document.getElementById("groupOnlinePanel").innerHTML = onlineUserStr;
            return;
        }
        var groups = curUser.groups;
        var onlineUserStr = "";
        for (var g = 0; g < groups.length; g++) {
            var group = groups[g];
            var users = group.users;
            onlineUserStr += "<span gid="+group.groupId+" onclick=\"checkGroup(this)\">&nbsp;" + group.name + "在线成员(" + group.online + "/" + users.length + ")</span>";
            for (var u = 0; u < users.length; u++) {
                var user = users[u];
                onlineUserStr += "<div id=\"" + user.userId + "\" nick=\"" + user.realName + "\" style=\"line-height: 25px;margin: 5px 5px 0 5px;padding-left:15px;cursor:pointer;\" onclick=\"onlineDb(this);\" onmouseover=\"onlineMove(this);\"  onmouseleave=\"onlineLeave(this);\">";
                var photo = ""
                if (user.avatar) {
                    photo = user.avatar
                } else {
                    photo = "https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fcdn.duitang.com%2Fuploads%2Fitem%2F201301%2F23%2F20130123120100_XYVZw.thumb.700_0.jpeg&refer=http%3A%2F%2Fcdn.duitang.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=jpeg?sec=1624065016&t=e7513469cd2c40236f5a8dfc52f3445e";
                }
                onlineUserStr +=  "<img alt=\"" + user.userId + "\" src=\"" + photo + "\" height=\"25px\" width=\"25px;\" style=\"float:left\">&nbsp;";
                onlineUserStr += "<font size='2'>" + user.realName + "(" + user.userId + ")</font></div>";
            }
        }
        if (!onlineUserStr) {
            onlineUserStr = "&nbsp;在线成员(0/0)";
        }
        document.getElementById("groupOnlinePanel").innerHTML = onlineUserStr;
    }

    function initOnlineFriendUsers() {
        if (!curUser.friends) {
            onlineUserStr = "&nbsp;在线成员(0/0)";
            document.getElementById("friendOnlinePanel").innerHTML = onlineUserStr;
            return;
        }
        var friends = curUser.friends;
        var onlineUserStr = "";
        for (var g = 0; g < friends.length; g++) {
            var friend = friends[g];
            var users = friend.users;
            onlineUserStr += "&nbsp;" + friend.name + "在线成员(" + friend.online + "/" + users.length + ")";
            for (var u = 0; u < users.length; u++) {
                var user = users[u];
                onlineUserStr += "<div id=\"" + user.userId + "\" nick=\"" + user.realName + "\" style=\"line-height: 25px;margin: 5px 5px 0 5px;padding-left:15px;cursor:pointer;\" onclick=\"onlineDb(this);\" onmouseover=\"onlineMove(this);\"  onmouseleave=\"onlineLeave(this);\">";

                var photo = "";
                if (user.avatar) {
                    photo = user.avatar
                } else {
                    photo = "https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fcdn.duitang.com%2Fuploads%2Fitem%2F201301%2F23%2F20130123120100_XYVZw.thumb.700_0.jpeg&refer=http%3A%2F%2Fcdn.duitang.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=jpeg?sec=1624065016&t=e7513469cd2c40236f5a8dfc52f3445e";
                }
                onlineUserStr +=  "<img alt=\"" + user.userId + "\" src=\"" + photo + "\" height=\"25px\" width=\"25px;\" style=\"float:left\">&nbsp";
                onlineUserStr +=  "<font size='2'>" + user.realName + "(" + user.userId + ")</font></div>";
            }
        }
        if (!onlineUserStr) {
            onlineUserStr = "&nbsp;在线成员(0/0)";
        }
        document.getElementById("friendOnlinePanel").innerHTML = onlineUserStr;
    }

    function disConnect() {
        socket.close();
    }

    function send() {
        var toId = "";
        if (onSelected) {
            toId = onSelected.getElementsByTagName("img")[0].alt;
        }
        var createTime = new Date().getTime();
        var content = document.getElementById('content').value;
        if (content == "")
            return;
        var msg = "{\"from\": \"" + curUser.userId + "\",\"to\": \"" + toId + "\",\"cmd\":\"11\",\"createTime\":" + createTime + ",\"chatType\":\"2\",\"msgType\": \"0\",\"content\": \"" + content + "\"}";
        if (!toId) {
            alert("请选择要私聊的人!");
            return;
        }
        if (toId == curUser.userId) {
            alert("无法给自己发送消息!");
            return;
        }
        socket.send(msg);
        var chatObj = eval("(" + msg + ")");
        var createTime = new Date(chatObj.createTime).Format("yyyy/MM/dd HH:mm:ss");
        //处理数据
        logDiv.innerHTML += "<font color='#228B22' size='1' style='font-weight: bold'>" + curUser.realName + "(" + chatObj.from + ") " + createTime + "</font><br>";
        //处理数据
        logDiv.innerHTML += "<font color='#FFFFFF' size='1'>&nbsp;" + chatObj.content + "</font><br>";
        document.getElementById('content').value = "";
    }

    function sendGroup() {

        if (!toGroupId) {
            alert("请选择要聊天的群!");
        }

        var toId = toGroupId;


        var createTime = new Date().getTime();
        var content = document.getElementById('content').value;
        if (content == "")
            return;
        var msg = "{\"from\": \"" + curUser.userId + "\",\"createTime\":" + createTime + ",\"cmd\":\"11\",\"groupId\":\""+toId+"\",\"chatType\":\"1\",\"msgType\":\"0\",\"content\": \"" + content + "\"}";
        console.log(msg);
        socket.send(msg);
        var chatObj = eval("(" + msg + ")");
        var createTime = new Date(chatObj.createTime).Format("yyyy/MM/dd HH:mm:ss");
        //处理数据
        logDiv.innerHTML += "<font color='#228B22' size='1' style='font-weight: bold'>" + curUser.nick + "(" + curUser.userId + ")" + " " + createTime + "</font><br>";
        //处理数据
        logDiv.innerHTML += "<font color='#FFFFFF' size='1'>&nbsp;" + chatObj.content + "</font><br>";
        document.getElementById('content').value = "";
    }

    function sendNotifyAccurate() {


        var createTime = new Date().getTime();

        var notifyTitle = document.getElementById('notifyTitle').value;
        var notifyContent = document.getElementById('notifyContent').value;
        if (notifyTitle == "" || notifyContent == "") {
            alert("请输入通知标题和通知内容");
            return;
        }

        var toIdStr = document.getElementById("notifyGoal").value;
        if (toIdStr == "") {
            alert("请输入目标用户id");
            return;
        }

        var toId = "[";
        var toIdArr = toIdStr.split(",");
        for (var i=0; i<toIdArr.length; i++) {
            toId += "\""+toIdArr[i] + "\","
        }
        toId = toId.substring(0, toId.length-1);
        toId += "]"

        var msg = "{\n" +
            "  \"cmd\": \"21\",\n" +
            "  \"businessType\": \"0\",\n" +
            "  \"notifyType\": \"2\",\n" +
            "  \"toGroupIds\":[],\n" +
            "  \"toUserIds\": " + toId + "," +
            "  \"from\": \""+curUser.userId+"\",\n" +
            "  \"sequence\": \"00000000001\",\n" +
            "  \"title\": \""+notifyTitle+"\",\n" +
            "  \"content\": \""+notifyContent+"\"\n" +
            "}";

        console.log(msg);
        socket.send(msg);
        var chatObj = eval("(" + msg + ")");
        var createTime = new Date(chatObj.createTime).Format("yyyy/MM/dd HH:mm:ss");

        //处理数据
        logDiv.innerHTML += "<font color='#228B22' size='1' style='font-weight: bold'>" + chatObj.from + " " + createTime + "</font><br>";
        //处理数据
        logDiv.innerHTML += "<font color='#FFFFFF' size='1'>" + chatObj.title + "&nbsp;" + chatObj.content + "</font><br>";
        document.getElementById('content').value = "";
    }

            "  \"toGroupIds\":" + toId + "," +
            "  \"toUserIds\": [],\n" +
            "  \"from\": \""+curUser.userId+"\",\n" +

            "  \"content\": \""+notifyContent+"\"\n" +
            "}";

        socket.send(msg);
        var chatObj = eval("(" + msg + ")");
        var createTime = new Date(chatObj.createTime).Format("yyyy/MM/dd HH:mm:ss");

        //处理数据
        logDiv.innerHTML += "<font color='#228B22' size='1' style='font-weight: bold'>" + chatObj.from + " " + createTime + "</font><br>";
        //处理数据
        logDiv.innerHTML += "<font color='#FFFFFF' size='1'>" + chatObj.title + "&nbsp;" + chatObj.content + "</font><br>";

    function sendPublishGroup()  {

        var createTime = new Date().getTime();
        var notifyTitle = document.getElementById('notifyTitle').value;
        var notifyContent = document.getElementById('notifyContent').value;
        if (notifyTitle == "" || notifyContent == "") {
            return;
        }

        var toIdStr = document.getElementById("notifyGoal").value;
        if (toIdStr == "") {
            alert("请输入目标租户id");
            return;
        }

        var toId = "[";
        var toIdArr = toIdStr.split(",");
        for (var i=0; i<toIdArr.length; i++) {
            toId += "\""+toIdArr[i] + "\","
        }
        toId = toId.substring(0, toId.length-1);
        toId += "]"

        var msg = "{\n" +
            "  \"cmd\": \"21\",\n" +
            "  \"businessType\": \"0\",\n" +
            "  \"notifyType\": \"0\",\n" +
            "  \"tenantIds\":" + toId + "," +
            "  \"toUserIds\": [],\n" +

        if (onSelected) {
