server {
  listen 80;
  server_name localhost;
  add_header X-Content-Type-Options nosniff;
  charset utf-8;
  client_header_buffer_size 1024k;
  large_client_header_buffers 4 1024k;
  client_max_body_size 500m;
  #前端
  root /usr/share/nginx/html/;

  # 跳转至登录页
  location = / {
      index index.html;
      try_files /usr/share/nginx/html /jvs-ui/index.html;
  }

  location ~ ^/ch/(.*) {
     return 302 $scheme://$http_host/#/login?ch=$1;
  }

location /app/source/axios/ {
    root /usr/share/nginx/html/;
}
# 剩余请求交给前端路由
location ~ ^/app/source/appIdentificationdemo/ {
  index index.html ;
try_files $uri $uri/ /app/source/appIdentificationdemo/index.html;
}


  location ^~ /jvs-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }

  location ^~ /jvs-upms-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }

  #自定义页面挂载chart, 使用ng转发, 再走特有路径
  location ^~ /app/chart-design-ui/ {
    proxy_set_header X-Forwarded-Port $Server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://jvs-chart-report-ui/chart-design-ui/;
    proxy_hide_header X-Frame-Options;   # 避免出现多个X-Frame-Options属性
    add_header X-Frame-Options ALLOWALL; # 将之前网页的SAMEORIGIN属性给替换了，可以嵌套了
  }
  #自定义页面挂载大屏, 使用ng转发, 再走特有路径
  location ^~ /app/data-screen-ui/ {
    proxy_set_header X-Forwarded-Port $Server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://jvs-chart-report-ui/data-screen-ui/;
    proxy_hide_header X-Frame-Options;   # 避免出现多个X-Frame-Options属性
    add_header X-Frame-Options ALLOWALL; # 将之前网页的SAMEORIGIN属性给替换了，可以嵌套了
  }

  #新增图表路由
  location ^~ /chart-design-ui/ {
      proxy_cookie_path /jvs-ui /jvs-ui;
      proxy_cookie_path / /;
      proxy_redirect off;
      proxy_set_header Host $host;
      proxy_set_header X-real-ip $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto http;
      proxy_pass http://jvs-chart-report-ui/chart-design-ui/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection  upgrade;
  }

  #新增图表路由
  location ^~ /jvs-chart-report-ui/ {
      proxy_cookie_path /jvs-ui /jvs-ui;
      proxy_cookie_path / /;
      proxy_redirect off;
      proxy_set_header Host $host;
      proxy_set_header X-real-ip $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto http;
      proxy_pass http://jvs-chart-report-ui/jvs-chart-report-ui/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection  upgrade;
  }

  location ^~ /jvs-print-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }

  location ^~ /page-design-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }

  location ^~ /jvs-iconmanage-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }

  location ^~ /rule-design-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }

  location ^~ /flowable-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }

  location ^~ /jvs-report-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }


  location ^~ /jvs-document-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }

  location ^~ /weixin-mp-ui/ {
      index index.html ;
      try_files $uri $uri/ /jvs-ui/index.html;
  }

   #静态资源
  location ^~ /static/ {
      root /usr/share/nginx/html/;
  }

  location ^~ /jvs-ui/static/js/ {
      root /usr/share/nginx/html/;
  }

  location ^~ /jvs-ui-public/ {
